services:
  # SQL Server Database
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: prueba-mediprocesos-sqlserver
    environment:
      ACCEPT_EULA: ${ACCEPT_EULA:-Y}
      SA_PASSWORD: ${SQL_SA_PASSWORD:-MyPassword123!}
      MSSQL_PID: ${MSSQL_PID:-Developer}
    ports:
      - "${SQL_PORT:-1433}:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
      - ./database/init.sql:/var/opt/mssql/init.sql
    networks:
      - mediprocesos-network
    command: /bin/bash -c "/opt/mssql/bin/sqlservr & sleep 20 && /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P ${SQL_SA_PASSWORD:-MyPassword123!} -C -i /var/opt/mssql/init.sql && wait"

  # Spring Boot Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: prueba-mediprocesos-backend
    environment:
      DB_HOST: sqlserver
      DB_PORT: 1433
      DB_NAME: ${SQL_DATABASE:-master}
      DB_USERNAME: sa
      DB_PASSWORD: ${SQL_SA_PASSWORD:-MyPassword123!}
      JWT_SECRET: ${JWT_SECRET:-defaultSecretKeyForDevelopmentOnlyChangeInProductionWithAtLeast32CharsFS}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
    ports:
      - "${BACKEND_PORT:-3000}:8080"
    depends_on:
      - sqlserver
    networks:
      - mediprocesos-network
    restart: unless-stopped
    command: sh -c "sleep 40 && java -jar app.jar"

  # Angular Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: prueba-mediprocesos-frontend
    environment:
      API_URL: http://localhost:${BACKEND_PORT:-3000}
    ports:
      - "${FRONTEND_PORT:-8080}:4200"
    depends_on:
      - backend
    networks:
      - mediprocesos-network

volumes:
  sqlserver_data:

networks:
  mediprocesos-network:
    driver: bridge
